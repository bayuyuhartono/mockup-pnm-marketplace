<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kurator — Pratinjau 6 Layar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14202E;
    --forest:#014A94;
    --forest-500:#1E63AD;
    --forest-300:#5C92CC;
    --gold:#D99A2B;
    --gold-deep:#B97E1C;
    --gold-soft:#FBEFD4;
    --clay:#B0532F;
    --clay-soft:#F4DED3;
    --paper:#F1F4F8;
    --card:#FFFFFF;
    --line:#E2E7EF;
    --line-strong:#CCD5E1;
    --muted:#5E6B7A;
    --muted-2:#8A95A3;
    --live:#2E7D5B;
    --live-soft:#DBEEE3;
    --r-sm:8px; --r:14px; --r-lg:22px;
    --shadow-sm:0 1px 2px rgba(20,40,30,.05),0 1px 1px rgba(20,40,30,.04);
    --shadow:0 6px 22px -10px rgba(14,59,51,.22),0 2px 6px -2px rgba(14,59,51,.08);
    --shadow-lg:0 24px 60px -28px rgba(14,59,51,.4);
    --font-display:'Bricolage Grotesque', 'Plus Jakarta Sans', system-ui, sans-serif;
    --font-body:'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  h1,h2,h3,h4{font-family:var(--font-display);margin:0;line-height:1.08;letter-spacing:-.01em;font-weight:700}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1}

  /* ===== Preview shell ===== */
  #app{min-height:100vh;display:flex;flex-direction:column}
  .pv-bar{
    position:sticky;top:0;z-index:50;
    background:var(--forest);
    color:#EAF1EC;
    padding:0 18px;
    display:flex;align-items:center;gap:18px;
    min-height:60px;
    box-shadow:0 1px 0 rgba(0,0,0,.15);
  }
  .pv-brand{display:flex;align-items:center;gap:10px;padding-right:18px;border-right:1px solid rgba(255,255,255,.14)}
  .pv-brand .wordmark{font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:-.02em;color:#fff}
  .pv-brand .wordmark span{color:var(--gold)}
  .pv-tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(234,241,236,.55);font-weight:600}
  .pv-tabs{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;padding:8px 0;scrollbar-width:none;-ms-overflow-style:none}
  .pv-tabs::-webkit-scrollbar{display:none}
  .pv-group{display:flex;align-items:center;gap:4px}
  .pv-sep{width:1px;height:22px;background:rgba(255,255,255,.13);margin:0 8px;flex:none}
  .pv-eyebrow{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:rgba(234,241,236,.45);margin-right:6px;font-weight:700;flex:none}
  .pv-tab{
    border:0;background:transparent;color:rgba(234,241,236,.72);
    padding:7px 13px;border-radius:999px;font-size:13.5px;font-weight:600;white-space:nowrap;
    transition:background .15s,color .15s;
  }
  .pv-tab:hover{background:rgba(255,255,255,.08);color:#fff}
  .pv-tab.active{background:var(--gold);color:#3a2606}
  .pv-note{font-size:11px;color:rgba(234,241,236,.5);white-space:nowrap;padding-left:8px;flex:none}

  .pv-stage{flex:1;min-height:0}
  .screen{animation:rise .4s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ===== Seal ===== */
  .seal{display:block}
  .stampin{animation:stamp .6s cubic-bezier(.2,.9,.25,1.1) both}
  @keyframes stamp{0%{opacity:0;transform:scale(1.4) rotate(-12deg)}60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(-4deg)}}

  /* ===== Badges ===== */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;line-height:1.4;white-space:nowrap}
  .badge svg{width:13px;height:13px}
  .b-live{background:var(--live-soft);color:#1f5d41}
  .b-hold{background:var(--gold-soft);color:#8a5b12}
  .b-rev{background:#E7EBF3;color:#3b4a66}
  .b-rej,.b-refund{background:var(--clay-soft);color:#8a3a1d}
  .b-paid{background:var(--live-soft);color:#1f5d41}
  .b-proc{background:var(--gold-soft);color:#8a5b12}
  .b-pending{background:#ECECE6;color:#5a5f54}
  .b-curated{background:var(--forest);color:var(--gold-soft)}

  /* ===== Public marketplace ===== */
  .pub-nav{display:flex;align-items:center;gap:18px;padding:16px 32px;background:var(--card);border-bottom:1px solid var(--line)}
  .pub-nav .logo{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.02em}
  .pub-nav .logo span{color:var(--gold-deep)}
  .pub-search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:9px 16px;color:var(--muted)}
  .pub-search input{border:0;background:transparent;outline:0;font:inherit;color:var(--ink);width:100%}
  .pub-nav .nav-act{margin-left:auto;display:flex;align-items:center;gap:18px;color:var(--muted)}
  .pub-nav .nav-act .ic{width:22px;height:22px}

  .hero{position:relative;background:
      radial-gradient(120% 130% at 88% -10%, rgba(217,154,43,.14), transparent 55%),
      linear-gradient(180deg, #0a57a6, #013b76);
    color:#EAF1EC;padding:46px 32px 40px;overflow:hidden}
  .hero .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px}
  .hero h1{font-size:clamp(28px,4vw,44px);max-width:18ch;font-weight:800;color:#fff}
  .hero h1 em{font-style:normal;color:var(--gold)}
  .hero p{max-width:52ch;margin:14px 0 0;color:rgba(234,241,236,.8);font-size:16px}
  .hero .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}
  .hero .chip{font-size:13px;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);color:#EAF1EC;font-weight:500}
  .hero .chip.on{background:var(--gold);color:#3a2606;border-color:transparent;font-weight:600}
  .hero .seal-float{position:absolute;right:36px;top:50%;transform:translateY(-50%) rotate(-6deg);width:120px;opacity:.96;filter:drop-shadow(0 16px 24px rgba(0,0,0,.25))}
  @media(max-width:820px){.hero .seal-float{display:none}}

  .catalog{padding:26px 32px 56px;max-width:1180px;margin:0 auto}
  .catalog-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
  .catalog-head h2{font-size:20px}
  .catalog-head .count{color:var(--muted);font-size:13.5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:18px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,border-color .18s;display:flex;flex-direction:column}
  .pcard:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--line-strong)}
  .pmedia{aspect-ratio:4/3;position:relative;display:flex;align-items:flex-end;padding:12px;overflow:hidden}
  .pmedia .mono-mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:62px;color:rgba(255,255,255,.42);letter-spacing:-.04em;user-select:none}
  .pmedia .cat-tag{position:relative;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:rgba(255,255,255,.92);background:rgba(0,0,0,.18);padding:4px 9px;border-radius:999px;backdrop-filter:blur(2px)}
  .pmedia .seal-chip{position:absolute;top:11px;right:11px}
  .pbody{padding:13px 14px 15px;display:flex;flex-direction:column;gap:7px;flex:1}
  .pbody .pname{font-weight:600;font-size:15px;letter-spacing:-.01em;line-height:1.25}
  .pbody .pmeta{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:-2px}
  .pbody .pprice{margin-top:auto;font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--ink)}
  .seal-chip{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);color:var(--forest);font-size:11px;font-weight:700;padding:4px 9px 4px 6px;border-radius:999px;box-shadow:var(--shadow-sm)}
  .seal-chip svg{width:15px;height:15px}

  /* ===== Product detail ===== */
  .pdp{max-width:1080px;margin:0 auto;padding:22px 32px 60px}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13.5px;font-weight:600;background:none;border:0;padding:6px 0;margin-bottom:14px}
  .back:hover{color:var(--forest)}
  .pdp-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:34px}
  @media(max-width:840px){.pdp-grid{grid-template-columns:1fr}}
  .pdp-media{aspect-ratio:1/1;border-radius:var(--r-lg);position:relative;display:flex;align-items:flex-end;padding:18px;overflow:hidden}
  .pdp-media .mono-mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:140px;color:rgba(255,255,255,.4);letter-spacing:-.05em}
  .pdp-media .cat-tag{position:relative;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:#fff;background:rgba(0,0,0,.2);padding:5px 11px;border-radius:999px}
  .pdp-info h1{font-size:30px;letter-spacing:-.02em;margin-bottom:6px}
  .pdp-info .loc{color:var(--muted);font-size:14px;display:flex;align-items:center;gap:6px}
  .pdp-price{font-family:var(--font-mono);font-weight:700;font-size:30px;margin:18px 0 4px}
  .pdp-buy{display:flex;gap:10px;margin:18px 0 26px}
  .btn{border:0;border-radius:var(--r-sm);font-weight:600;font-size:15px;padding:13px 22px;transition:transform .12s,box-shadow .15s,background .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--forest);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:#013b76}
  .btn-ghost{background:var(--card);color:var(--forest);border:1px solid var(--line-strong)}
  .btn-ghost:hover{border-color:var(--forest-300)}
  .seller-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;display:flex;gap:14px;align-items:flex-start}
  .seller-av{width:46px;height:46px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#fff;font-size:18px}
  .seller-card .who{font-weight:700;font-size:15px}
  .seller-card .role{font-size:12.5px;color:var(--muted)}
  .seller-card .story{font-size:13.5px;color:var(--ink);margin-top:9px;line-height:1.55;opacity:.9}
  .curated-line{display:flex;align-items:center;gap:10px;margin-top:18px;padding:13px 15px;background:var(--gold-soft);border-radius:var(--r);border:1px solid #EFD9A8}
  .curated-line svg{width:26px;height:26px;flex:none}
  .curated-line .t{font-size:13px;line-height:1.45}
  .curated-line .t b{font-family:var(--font-display)}

  /* ===== Internal workspace ===== */
  .ws{max-width:1240px;margin:0 auto;padding:24px 32px 56px}
  .ws-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}
  .ws-eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--gold-deep);margin-bottom:7px;display:flex;align-items:center;gap:8px}
  .ws-head h1{font-size:26px;letter-spacing:-.02em}
  .ws-head .sub{color:var(--muted);font-size:14px;margin-top:5px}
  .role-chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;background:var(--card);border:1px solid var(--line)}
  .role-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
  .role-chip.pnm{background:var(--forest);color:#EAF1EC;border-color:transparent}
  .role-chip.pnm .dot{background:var(--gold)}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  @media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px}
  .stat .label{font-size:12.5px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:7px}
  .stat .num{font-family:var(--font-mono);font-weight:700;font-size:26px;letter-spacing:-.02em;margin-top:10px;color:var(--ink)}
  .stat .delta{font-size:12px;margin-top:7px;font-weight:600;display:flex;align-items:center;gap:5px}
  .stat .delta.up{color:var(--live)}
  .stat.accent{background:linear-gradient(160deg,#0a57a6,#013b76);border-color:transparent;color:#fff}
  .stat.accent .label{color:rgba(234,241,236,.7)}
  .stat.accent .num{color:var(--gold)}
  .stat.accent .delta{color:rgba(234,241,236,.75)}

  .split{display:grid;grid-template-columns:1.35fr 1fr;gap:20px}
  @media(max-width:920px){.split{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .panel-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .panel-head h3{font-size:15px}
  .panel-head .meta{font-size:12.5px;color:var(--muted)}

  .qitem{display:flex;gap:13px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .qitem:last-child{border-bottom:0}
  .qitem:hover{background:#F7F9F5}
  .qitem.sel{background:var(--gold-soft)}
  .qthumb{width:46px;height:46px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#fff;font-size:16px}
  .qmain{flex:1;min-width:0}
  .qmain .qn{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qmain .qs{font-size:12.5px;color:var(--muted);margin-top:2px}
  .qmeta{text-align:right;flex:none}
  .qmeta .qp{font-family:var(--font-mono);font-weight:700;font-size:14px}
  .qmeta .qd{font-size:11.5px;color:var(--muted-2);margin-top:3px}

  .detail{padding:20px}
  .detail .dh{display:flex;gap:13px;align-items:flex-start;margin-bottom:16px}
  .detail .dthumb{width:64px;height:64px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#fff;font-size:22px}
  .detail .dh h3{font-size:17px}
  .detail .dh .dsub{font-size:13px;color:var(--muted);margin-top:3px}
  .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
  .kv .k{color:var(--muted)}
  .kv .v{font-weight:600}
  .kv .v.mono{font-family:var(--font-mono)}
  .detail .acts{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap}
  .btn-sm{padding:10px 16px;font-size:13.5px;border-radius:var(--r-sm);font-weight:600;border:0}
  .btn-approve{background:var(--forest);color:#fff;flex:1}
  .btn-approve:hover{background:#013b76}
  .btn-revise{background:var(--card);border:1px solid var(--line-strong);color:var(--ink)}
  .btn-reject{background:var(--clay-soft);color:#8a3a1d;border:1px solid #E7C6B6}
  .stamped{text-align:center;padding:22px 8px 6px}
  .stamped .seal{width:104px;margin:0 auto 14px}
  .stamped .msg{font-family:var(--font-display);font-weight:700;font-size:17px}
  .stamped .msg2{font-size:13px;color:var(--muted);margin-top:4px}

  /* table */
  .tbl{width:100%;border-collapse:collapse}
  .tbl th{text-align:left;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:12px 18px;border-bottom:1px solid var(--line);background:#FBFCFA}
  .tbl td{padding:13px 18px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  .tbl tr:last-child td{border-bottom:0}
  .tbl tbody tr:hover{background:#F8FAF6}
  .tbl .num{font-family:var(--font-mono);font-weight:600}
  .tbl .who{display:flex;align-items:center;gap:11px}
  .tbl .av{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px}
  .tbl .nm{font-weight:600}
  .tbl .gp{font-size:12px;color:var(--muted)}

  .impact-banner{display:flex;gap:16px;align-items:center;background:linear-gradient(120deg,#0a57a6,#013b76);color:#EAF1EC;border-radius:var(--r);padding:18px 22px;margin-bottom:24px}
  .impact-banner .seal{width:54px;flex:none}
  .impact-banner .bt h3{font-family:var(--font-display);font-size:16px;color:#fff;margin-bottom:3px}
  .impact-banner .bt p{font-size:13.5px;color:rgba(234,241,236,.78);margin:0;max-width:70ch}
  .impact-banner .bt p b{color:var(--gold)}

  .legend{font-size:12px;color:var(--muted);margin-top:16px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .legend b{color:var(--ink)}

  /* form (PIC submit) */
  .form{padding:20px}
  .field{margin-bottom:16px}
  .field>label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:7px}
  .field .hint{font-weight:400;color:var(--muted-2)}
  .inp{width:100%;border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:11px 13px;font:inherit;font-size:14px;color:var(--ink);background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s}
  .inp::placeholder{color:var(--muted-2)}
  .inp:focus{border-color:var(--forest-300);box-shadow:0 0 0 3px rgba(1,74,148,.12)}
  textarea.inp{resize:vertical;min-height:84px;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .inp-wrap{position:relative}
  .inp-wrap .pre{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-family:var(--font-mono);font-size:14px}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{border:1px solid var(--line-strong);background:var(--card);padding:8px 15px;border-radius:999px;font:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
  .seg button:hover{border-color:var(--forest-300)}
  .seg button.on{background:var(--forest);color:#fff;border-color:transparent}
  .uploads{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .upslot{aspect-ratio:1/1;border:1.5px dashed var(--line-strong);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted-2);font-size:12px;font-weight:500;cursor:pointer;background:#FAFBFE;transition:.15s}
  .upslot:hover{border-color:var(--forest-300);color:var(--forest-500)}
  .fdivider{margin:22px 0 16px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--font-display);font-weight:700;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .fdivider svg{color:var(--muted)}
  .form-acts{display:flex;gap:10px;margin-top:6px}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div id="app">
  <header class="pv-bar">
    <div class="pv-brand">
      <span class="wordmark">Market<span>place</span></span>
    </div>
    <nav class="pv-tabs">
      <span class="pv-eyebrow">Pembeli</span>
      <div class="pv-group">
        <button class="pv-tab" :class="{active:current==='catalog'}" @click="go('catalog')">Etalase</button>
        <button class="pv-tab" :class="{active:current==='product'}" @click="go('product')">Detail Produk</button>
      </div>
      <span class="pv-sep"></span>

const app = createApp({
  data(){return { current:'catalog', selected:null, TINTS } },
  computed:{ screenComp(){return SCREENS[this.current]} },
  methods:{
    go(s){this.current=s; window.scrollTo({top:0})},
    openProduct(p){this.selected=p; this.go('product')}
  }
});
app.component('seal-stamp', Seal);
app.config.globalProperties.TINTS = TINTS;
// expose TINTS to all components
app.mixin({ created(){ this.TINTS = TINTS; } });
app.mount('#app');
